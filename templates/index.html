<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>geno.iafuturecoded | Control Hub</title>
    <style>
        body { background-color: #0b0b0c; color: #e4e4e7; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: #121214; border: 1px solid #27272a; border-radius: 12px; padding: 24px; }
        h2 { color: #f39c12; border-bottom: 1px solid #27272a; padding-bottom: 12px; margin-top: 0; }
        .section-title { font-size: 14px; text-transform: uppercase; color: #a1a1aa; margin-top: 24px; margin-bottom: 12px; }
        .wallet-card { background: #1e1e24; border: 1px solid #f39c12; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .balance-usd { font-size: 28px; font-weight: bold; color: #fff; }
        .balance-btc { font-size: 16px; color: #f39c12; margin-top: 8px; }
        label { display: block; margin-top: 12px; margin-bottom: 6px; font-size: 14px; }
        input { width: 100%; padding: 12px; background: #1e1e24; border: 1px solid #27272a; color: #fff; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; }
        button { width: 100%; padding: 14px; background: #f39c12; color: #000; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>geno.iafuturecoded</h2>

    <div class="section-title">Tesorería Activa</div>
    <div class="wallet-card">
        <div class="balance-usd">${{ crypto.usd }} USD</div>
        <div class="balance-btc">₿ {{ crypto.btc }} BTC</div>
    </div>

    <div class="section-title">Ingresar Nuevos Datos</div>
    <form action="/registrar_ingreso" method="POST">
        <label>Concepto del Trabajo:</label>
        <input type="text" name="concepto" placeholder="Ej. Lawn Master Servicio" required>
        
        <label>Monto en Dólares ($):</label>
        <input type="number" step="0.01" name="monto_usd" placeholder="0.00">

        <label>Monto en Bitcoin (₿):</label>
        <input type="number" step="0.000001" name="monto_btc" placeholder="0.000000">
        
        <button type="submit">Guardar en Base de Datos</button>
    </form>
</div>
</body>
</html>
