<div class="panel">
    <h2>Minería de Leads Inteligente (Scraper)</h2>
    <form action="/minar" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <div class="form-row">
            <select name="zona" style="width: 100%; padding: 12px; background: #030406; border: 1px solid #1b1f2d; color: white; border-radius: 6px; font-family: sans-serif;">
                <option value="Seattle">Seattle (General)</option>
                <option value="Redmond">Redmond (Premium Tech)</option>
                <option value="Kirkland">Kirkland (Waterfront)</option>
                <option value="Bellevue">Bellevue (Business & Wealth)</option>
            </select>
        </div>
        <button type="submit" class="btn" style="background-color: var(--green);">Lanzar Robot de Extracción</button>
    </form>
    <p style="margin: 8px 0 0 0; font-size: 10px; color: var(--muted);">
        El robot inspeccionará la zona seleccionada, aislará correos electrónicos mediante lógica algorítmica y fabricará los pitches en USD de inmediato.
    </p>
</div>
